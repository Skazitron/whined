syntax = "proto3";

package whine.v1;

option go_package = "github.com/Skazitron/whine/gen/whine/v1;whinev1";

service WhineControl {
  rpc SetMix(Mix) returns (Ack);
  rpc StreamMix(stream Mix) returns (stream Ack);
  rpc Play(FadeRequest) returns (Ack);
  rpc Pause(FadeRequest) returns (Ack);
  rpc GetStatus(Empty) returns (Status);
}

message Mix {
  float                master_volume = 1;
  repeated VoiceParams voices = 2;
}

message VoiceParams {
  int32 voice_id    = 1;
  bool enabled      = 2;
  float volume      = 3;
  float cutoff_hz   = 4;
  NoiseType type    = 5;
  float frequency   = 6;
}

message FadeRequest {
  int32 fade_ms = 1;
}

message Status {
  bool playing = 1;
  Mix  mix = 2;
}

enum NoiseType {
  NOISE_TYPE_UNSPECIFIED = 0;
  NOISE_TYPE_WHITE       = 1;
  NOISE_TYPE_PINK        = 2;
  NOISE_TYPE_BROWN       = 3;
}

message Ack {
  bool   ok      = 1;
  string message = 2;
}

message Empty {}
